<svg viewBox="0 0 220 48" xmlns="http://www.w3.org/2000/svg" aria-label="Lumira">
  <!-- Circle dot at the peak -->
  <circle cx="16" cy="9" r="5" fill="#C4844E" />

  <!-- Womb arch — wide rounded dome opening upward, like a mother's womb -->
  <path
    d="M 3,38 C 3,14 29,14 29,38"
    fill="none"
    stroke="#3D8178"
    stroke-width="2.4"
    stroke-linecap="round"
  />

  <!-- Wordmark -->
  <text x="38" y="36"
    font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
    font-size="30"
    font-weight="700"
    fill="#1A1A2E"
    letter-spacing="-0.7"
  >Lumira</text>
</svg>
